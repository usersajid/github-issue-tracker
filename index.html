<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <title>Github Issue Tracker</title>
    
    <link rel="icon" type="image/x-icon" href="./assets/favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-[#F3F4F6] flex items-center justify-center  p-4">
    <main class="bg-white p-10 rounded-lg shadow-md w-full max-w-md border border-gray-200">
    <div class="text-center mb-8">
        <div class="flex justify-center mb-4">
            <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="Logo" class="w-24 h-24">
        </div>
        <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
        <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
    </div>

    <form id="login-form" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" id="username" placeholder="admin" class="w-full px-4 py-2.5 border rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none transition" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="password" placeholder="admin123" class="w-full px-4 py-2.5 border rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none transition" required>
        </div>
        
        <div class="flex items-center justify-between">
            <div class="flex items-center">
                <input type="checkbox" id="remember" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                <label for="remember" class="ml-2 text-sm text-gray-600">Remember me</label>
            </div>
            <a href="#" class="text-sm text-indigo-600 hover:text-indigo-800 transition">Forgot password?</a>
        </div>

        <button type="submit" class="w-full bg-[#5C33FF] text-white py-3 rounded-md font-semibold hover:bg-indigo-700 transition duration-300">Sign In</button>
    </form>

    <div class="mt-8 p-5 bg-gray-50 rounded-md text-center border border-gray-100">
        <p class="text-xs text-gray-500 uppercase font-bold tracking-wider mb-2.5">Demo Credential</p>
        <p class="text-sm text-gray-700 font-mono">Username: <span class="text-gray-900 font-semibold">admin</span></p>
        <p class="text-sm text-gray-700 font-mono mt-1">Password: <span class="text-gray-900 font-semibold">admin123</span></p>
    </div>
</main>
    <script src="./app.js"></script>
</body>
</html>
