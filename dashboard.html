<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#F3F4F6] min-h-screen">

    <main id="main-content" class="container mx-auto p-4 md:p-8">

        <nav
            class="bg-white border-b border-gray-200 py-4 px-6 md:px-12 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <img src="./assets/github-logo.png" class="w-8" alt="GitHub Logo">
                <span class="font-bold text-lg text-gray-900 hidden sm:block">GitHub Issues Tracker</span>
            </div>

            <div class="flex items-center gap-2 w-full max-w-md">
                <input type="text" id="search-input" placeholder="Search issues..."
                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition">
                <button onclick="handleSearch()"
                    class="bg-[#5C33FF] text-white px-5 py-2 rounded-lg font-semibold text-sm hover:bg-indigo-700 transition">Search</button>
            </div>
        </nav>
    </main>
    <main class="max-w-7xl mx-auto p-6 md:p-12">
        <div class="flex gap-2 mb-8">
            <button id="btn-all" onclick="filterIssues('all')">All</button>
            <button id="btn-open" onclick="filterIssues('open')">Open</button>
            <button id="btn-closed" onclick="filterIssues('closed')">Closed</button>
        </div>

        <div class="bg-white border border-gray-200 rounded-xl p-5 mb-8 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-50 p-3 rounded-lg text-[#5C33FF]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                        </path>
                    </svg>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-gray-900"><span id="issue-count">0</span> Issues</h2>
                    <p class="text-xs text-gray-500 font-medium">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 text-sm font-medium">
                <span class="flex items-center gap-1.5 text-gray-600"><span
                        class="w-2 h-2 bg-green-500 rounded-full"></span> Open</span>
                <span class="flex items-center gap-1.5 text-gray-600"><span
                        class="w-2 h-2 bg-purple-500 rounded-full"></span> Closed</span>
            </div>
        </div>

        <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
